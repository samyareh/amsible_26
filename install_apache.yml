---

-  hosts: all
   become: true
   tasks:

  
   - name: update then install apache2 and php packages for Ubuntu
     apt:
       name: 
         - apache2
         - libapache2-mod-php
       state: latest
       update_cache: yes
     when: ansible_distribution in ["Ubuntu" , "Debian"]   
   


  
   - name: update then install apache and php packages for CentOS
     yum:
       name: 
          - httpd
          - php
       state: latest
       update_cache: yes
     when: ansible_distribution == "CentOS"


 
