---

-  hosts: all
   become: true
   tasks:

   - name: update the repos
     apt:
       update_cache: true
     when: ansible_distribution == "Ubuntu"
   
   - name: install apache2 package
     apt:
       name: apache2
       state: latest
     when: ansible_distribution == "Ubuntu"   
   
   - name: install php to support apache2
     apt:
       name: libapache2-mod-php
       state: latest
     when: ansible_distribution == "Ubuntu"


   - name: update the repos
     yum:
       update_cache: true
     when: ansible_distribution == "CentOS"


   - name: install apache package
     yum:
       name: httpd
       state: latest
     when: ansible_distribution == "CentOS"


   - name: install php 
     yum:
       name: php
       state: latest
     when: ansible_distribution == "CentOS"


