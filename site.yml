---
- hosts: all
  become: true
  tasks: 

    - name: install updates (CentOS)
      yum:
        update_cache: yes
        update_only: yes
      when: ansible_distribution == "CentOS"


    - name: install updates (Ubuntu and Debian)
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_distribution in ["Ubuntu", "Debian"]
 

-  hosts: Web-servers
   become: true
   tasks:

     - name: install apache and php for CentOS
       dnf:
         name:
            - httpd
            - php
         state: latest
       when: ansible_distribution == "Centos"


     - name: install apache and php for Ubuntu
       apt:
         name:
            - apache2
            - libapache2-mod-php
         state: latest
       when: ansible_distribution == "Ubuntu"


-  hosts: DB-server
   become: true
   tasks:

     - name: install mariadb (Debian)
       apt:
         name: mariadb-server
         state: latest
       when: ansible_distribution == "Debian"



-  hosts: File-servers
   become: true
   tasks:

     - name: install samba package
       package: 
         name: samba
         state: latest
