---
- hosts: all
  become: true
  tasks: 

    - name: install updates (CentOS)
      tags: always
      yum:
        update_cache: yes
        update_only: yes
      when: ansible_distribution == "CentOS"


    - name: install updates (Ubuntu and Debian)
      tags: always
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_distribution in ["Ubuntu", "Debian"]
 

-  hosts: Web-servers
   become: true
   tasks:

     - name: install apache and php for CentOS
       tags: apache,httpd,centos
       dnf:
         name:
            - httpd
            - php
         state: latest
       when: ansible_distribution == "Centos"


     - name: install apache and php for Ubuntu
       tags: apache,apache2,ubuntu
       apt:
         name:
            - apache2
            - libapache2-mod-php
         state: latest
       when: ansible_distribution == "Ubuntu"

     - name: copy default html file for site
       tags: apache,apache2,httpd
       copy:
         src: default_site.html
         dest: /var/www/html/index.html
         owner: root
         group: root
         mode: 0664


-  hosts: DB-server
   become: true
   tasks:

     - name: install mariadb (Debian)
       tags: debian, db, mariadb
       apt:
         name: mariadb-server
         state: latest
       when: ansible_distribution == "Debian"



-  hosts: File-servers
   become: true
   tasks:

     - name: install samba package
       package: 
         name: samba
         state: latest
